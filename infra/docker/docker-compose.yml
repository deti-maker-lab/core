services:
  postgres:
    image: postgres:16
    container_name: makerlab-postgres
    environment:
      POSTGRES_DB: makerlab
      POSTGRES_USER: makerlab
      POSTGRES_PASSWORD: makerlab
    ports:
      - "5432:5432"
    volumes:
      - makerlab_postgres:/var/lib/postgresql/data

volumes:
  makerlab_postgres: